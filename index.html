<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>External SheetChat</title>
    <style>
        :root { --wa-green: #075e54; --wa-bg: #e5ddd5; }
        body { font-family: sans-serif; margin: 0; background: var(--wa-bg); display: flex; flex-direction: column; height: 100vh; }
        .header { background: var(--wa-green); color: white; padding: 15px; text-align: center; }
        #setup { padding: 10px; background: white; display: flex; gap: 5px; justify-content: center; border-bottom: 1px solid #ccc; }
        #chat-box { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        .msg { max-width: 70%; padding: 10px; margin-bottom: 8px; border-radius: 8px; font-size: 14px; }
        .sent { align-self: flex-end; background: #dcf8c6; }
        .received { align-self: flex-start; background: white; }
        .footer { padding: 10px; background: #f0f0f0; display: flex; gap: 10px; }
        input { padding: 10px; border-radius: 20px; border: 1px solid #ccc; flex: 1; outline: none; }
        button { background: var(--wa-green); color: white; border: none; padding: 10px 20px; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">External SheetChat</div>

<div id="setup">
    <input type="tel" id="my-num" placeholder="My Phone">
    <input type="tel" id="friend-num" placeholder="Friend Phone">
    <button onclick="connect()">Connect</button>
</div>

<div id="chat-box"></div>

<div class="footer">
    <input type="text" id="msg-input" placeholder="Type a message...">
    <button onclick="send()">Send</button>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzZyziwpIPaW8GCKZRvDcYOLXcmYTAtRDqh4Uq1jvMMe2TkuLHGD98QMJVPvS_g1m_j/exec"; // PASTE YOUR URL HERE
    let myNum = "", friendNum = "", lastCount = 0;

    function connect() {
        myNum = document.getElementById('my-num').value;
        friendNum = document.getElementById('friend-num').value;
        if(myNum && friendNum) {
            alert("Connected!");
            document.getElementById('setup').style.display = "none";
            setInterval(fetchMessages, 4000);
            fetchMessages();
        }
    }

    async function send() {
        const input = document.getElementById('msg-input');
        const msg = input.value;
        if (!msg) return;

        // Show immediately
        document.getElementById('chat-box').innerHTML += `<div class="msg sent">${msg}</div>`;
        input.value = "";

        await fetch(SCRIPT_URL, {
            method: "POST",
            mode: "no-cors", // Required for Apps Script POST from external sites
            body: JSON.stringify({ action: "send", sender: myNum, receiver: friendNum, message: msg })
        });
    }

    async function fetchMessages() {
        try {
            const response = await fetch(SCRIPT_URL, {
                method: "POST",
                body: JSON.stringify({ action: "fetch", myNum: myNum, friendNum: friendNum })
            });
            const data = await response.json();
            
            if (data.length !== lastCount) {
                const box = document.getElementById('chat-box');
                box.innerHTML = data.map(m => {
                    const type = (String(m.sender) === String(myNum)) ? 'sent' : 'received';
                    return `<div class="msg ${type}">${m.text}</div>`;
                }).join('');
                box.scrollTop = box.scrollHeight;
                lastCount = data.length;
            }
        } catch (e) {
            console.log("Fetch pending or error...");
        }
    }
</script>

</body>
</html>
